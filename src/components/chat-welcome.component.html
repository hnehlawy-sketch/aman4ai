<div class="flex-1 flex flex-col items-center justify-center text-center opacity-100 animate-slide-up py-6 sm:py-10">
   <!-- Logo -->
   <div class="w-16 h-16 mb-6 relative flex items-center justify-center">
     <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="url(#logoGradientLarge)" class="w-16 h-16 drop-shadow-lg">
       <defs>
         <linearGradient id="logoGradientLarge" x1="0%" y1="0%" x2="100%" y2="100%">
           <stop offset="0%" stop-color="#3b82f6" />
           <stop offset="100%" stop-color="#8b5cf6" />
         </linearGradient>
       </defs>
       <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
     </svg>
   </div>

   <h2 class="text-2xl sm:text-3xl font-medium text-slate-900 dark:text-white mb-2">{{ t().greeting }}</h2>
   <h2 class="text-lg sm:text-xl font-medium opacity-50 mb-8">{{ t().greetingSub }}</h2>
   
   <!-- Prompt Templates Row (Gemini Style) -->
   <div class="grid grid-cols-2 sm:flex sm:flex-row sm:flex-nowrap gap-2 sm:gap-3 w-full max-w-4xl px-4 sm:overflow-x-auto pb-4 sm:snap-x justify-start sm:justify-center no-scrollbar">
     
     <!-- Email Card -->
     <button (click)="usePrompt.emit(t().sugEmailPrompt)" 
       class="w-full sm:min-w-[150px] sm:w-[180px] h-auto sm:h-[130px] flex flex-col items-start justify-between text-start p-3 sm:p-4 rounded-xl sm:rounded-2xl border transition-all hover:-translate-y-1 hover:shadow-md group snap-center shrink-0 gap-2 sm:gap-0"
       [class.bg-white]="!themeService.isDark()" [class.border-gray-200]="!themeService.isDark()" [class.hover:border-blue-300]="!themeService.isDark()"
       [class.bg-slate-800]="themeService.isDark()" [class.border-slate-700]="themeService.isDark()" [class.hover:border-blue-500/50]="themeService.isDark()">
       <div class="p-1.5 sm:p-2 w-fit rounded-lg sm:rounded-full bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 flex-shrink-0">
         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" /></svg>
       </div>
       <span class="font-bold text-xs sm:text-sm leading-tight">{{ t().sugEmailTitle }}</span>
       <div class="hidden sm:block flex-grow"></div>
     </button>

     <!-- Summary Card -->
     <button (click)="usePrompt.emit(t().sugSummaryPrompt)" 
       class="w-full sm:min-w-[150px] sm:w-[180px] h-auto sm:h-[130px] flex flex-col items-start justify-between text-start p-3 sm:p-4 rounded-xl sm:rounded-2xl border transition-all hover:-translate-y-1 hover:shadow-md group snap-center shrink-0 gap-2 sm:gap-0"
       [class.bg-white]="!themeService.isDark()" [class.border-gray-200]="!themeService.isDark()" [class.hover:border-green-300]="!themeService.isDark()"
       [class.bg-slate-800]="themeService.isDark()" [class.border-slate-700]="themeService.isDark()" [class.hover:border-green-500/50]="themeService.isDark()">
       <div class="p-1.5 sm:p-2 w-fit rounded-lg sm:rounded-full bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400 flex-shrink-0">
         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" /></svg>
       </div>
       <span class="font-bold text-xs sm:text-sm leading-tight">{{ t().sugSummaryTitle }}</span>
       <div class="hidden sm:block flex-grow"></div>
     </button>

     <!-- Ideas Card -->
     <button (click)="usePrompt.emit(t().sugIdeasPrompt)" 
       class="w-full sm:min-w-[150px] sm:w-[180px] h-auto sm:h-[130px] flex flex-col items-start justify-between text-start p-3 sm:p-4 rounded-xl sm:rounded-2xl border transition-all hover:-translate-y-1 hover:shadow-md group snap-center shrink-0 gap-2 sm:gap-0"
       [class.bg-white]="!themeService.isDark()" [class.border-gray-200]="!themeService.isDark()" [class.hover:border-purple-300]="!themeService.isDark()"
       [class.bg-slate-800]="themeService.isDark()" [class.border-slate-700]="themeService.isDark()" [class.hover:border-purple-500/50]="themeService.isDark()">
       <div class="p-1.5 sm:p-2 w-fit rounded-lg sm:rounded-full bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400 flex-shrink-0">
         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.829 1.58-1.936a4.668 4.668 0 0 0 3.169-3.067m0 0a4.668 4.668 0 0 0-3.948-5.234 4.624 4.624 0 0 0-4.053 1.25M14.25 18v-.192c0-.983.658-1.829 1.58-1.936a4.668 4.668 0 0 0 3.169-3.067m0 0a4.668 4.668 0 0 0-3.948-5.234 4.624 4.624 0 0 0-4.053 1.25m0 0a5.25 5.25 0 0 0-10.5 0m10.5 0v2.25m-10.5 0c0 1.122.878 2 2 2h6.5" /></svg>
       </div>
       <span class="font-bold text-xs sm:text-sm leading-tight">{{ t().sugIdeasTitle }}</span>
       <div class="hidden sm:block flex-grow"></div>
     </button>

     <!-- Translate Card -->
     <button (click)="usePrompt.emit(t().sugTranslatePrompt)" 
       class="w-full sm:min-w-[150px] sm:w-[180px] h-auto sm:h-[130px] flex flex-col items-start justify-between text-start p-3 sm:p-4 rounded-xl sm:rounded-2xl border transition-all hover:-translate-y-1 hover:shadow-md group snap-center shrink-0 gap-2 sm:gap-0"
       [class.bg-white]="!themeService.isDark()" [class.border-gray-200]="!themeService.isDark()" [class.hover:border-indigo-300]="!themeService.isDark()"
       [class.bg-slate-800]="themeService.isDark()" [class.border-slate-700]="themeService.isDark()" [class.hover:border-indigo-500/50]="themeService.isDark()">
       <div class="p-1.5 sm:p-2 w-fit rounded-lg sm:rounded-full bg-indigo-100 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 flex-shrink-0">
         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6"><path stroke-linecap="round" stroke-linejoin="round" d="m10.5 21 5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 0 1 6-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25V3m3.334 2.364C11.176 10.658 7.69 15.08 3 17.502m9.334-12.138c.896.061 1.785.147 2.666.257m-4.589 8.495a18.023 18.023 0 0 1-3.827-5.802" /></svg>
       </div>
       <span class="font-bold text-xs sm:text-sm leading-tight">{{ t().sugTranslateTitle }}</span>
       <div class="hidden sm:block flex-grow"></div>
     </button>
   </div>
</div>
