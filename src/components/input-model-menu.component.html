<div class="fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/40 backdrop-blur-[2px]" (click)="closeMenu.emit()">
  <div class="bg-white dark:bg-slate-900 w-full max-w-md sm:max-w-[320px] rounded-t-[32px] sm:rounded-[32px] p-4 sm:p-2 shadow-2xl border-t sm:border border-gray-100 dark:border-slate-800 animate-slide-up" (click)="$event.stopPropagation()">
    <!-- Handle for mobile -->
    <div class="w-12 h-1.5 bg-gray-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
    
    <div class="flex flex-col gap-2">
      <button (click)="setModel.emit({key: 'fast', closeMenu: true})" class="w-full text-right px-5 py-4 sm:py-3 rounded-2xl flex flex-col gap-1 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors" [class.bg-blue-50]="modelKey() === 'fast' && theme() === 'light'" [class.dark:bg-blue-900/20]="modelKey() === 'fast' && theme() === 'dark'">
        <div class="flex items-center justify-between">
          <span class="text-base sm:text-sm font-bold" [class.text-blue-600]="modelKey() === 'fast'">{{ t().engineFast }}</span>
          @if (modelKey() === 'fast') {
            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
          }
        </div>
        <span class="text-xs sm:text-[10px] opacity-50">{{ t().engineFastDesc }}</span>
      </button>
      
      <button (click)="setModel.emit({key: 'core', closeMenu: true})" class="w-full text-right px-5 py-4 sm:py-3 rounded-2xl flex flex-col gap-1 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors" [class.bg-blue-50]="modelKey() === 'core' && theme() === 'light'" [class.dark:bg-blue-900/20]="modelKey() === 'core' && theme() === 'dark'">
        <div class="flex items-center justify-between">
          <span class="text-base sm:text-sm font-bold" [class.text-blue-600]="modelKey() === 'core'">{{ t().engineCore }}</span>
          @if (modelKey() === 'core') {
            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
          }
        </div>
        <span class="text-xs sm:text-[10px] opacity-50">{{ t().engineCoreDesc }}</span>
      </button>
      
      <button (click)="setModel.emit({key: 'pro', closeMenu: true})" class="w-full text-right px-5 py-4 sm:py-3 rounded-2xl flex flex-col gap-1 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors" [class.bg-blue-50]="modelKey() === 'pro' && theme() === 'light'" [class.dark:bg-blue-900/20]="modelKey() === 'pro' && theme() === 'dark'">
        <div class="flex items-center justify-between">
          <span class="text-base sm:text-sm font-bold" [class.text-blue-600]="modelKey() === 'pro'">{{ t().enginePro }}</span>
          @if (modelKey() === 'pro') {
            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
          }
        </div>
        <span class="text-xs sm:text-[10px] opacity-50">{{ t().engineProDesc }}</span>
      </button>
    </div>

    <button (click)="closeMenu.emit()" class="w-full mt-4 py-4 text-sm font-bold text-slate-400 sm:hidden">
      {{ t().close || 'إغلاق' }}
    </button>
  </div>
</div>
