<div class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-sm fade-in">
  <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl border border-gray-100 dark:border-slate-700 relative animate-slide-up">
     <div class="flex flex-col items-center text-center">
        <div class="w-16 h-16 bg-slate-900 dark:bg-white rounded-2xl flex items-center justify-center shadow-lg mb-4 text-white dark:text-slate-900">
           <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
             <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
           </svg>
        </div>
        <h3 class="text-xl font-bold mb-2 dark:text-white">{{ t().installApp }}</h3>
        <p class="text-sm opacity-70 mb-6 dark:text-gray-300 leading-relaxed">{{ t().installDesc }}</p>
        
        <button (click)="installPwa.emit()" class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 dark:bg-white dark:text-slate-900 dark:hover:bg-gray-100 text-white rounded-xl font-bold mb-3 transition-colors shadow-lg shadow-slate-900/10 dark:shadow-white/5">
          {{ t().install }}
        </button>
        <button (click)="dismissInstall.emit()" class="w-full py-2.5 text-sm font-bold opacity-50 hover:opacity-100 dark:text-white transition-opacity">
          {{ t().later }}
        </button>
     </div>
  </div>
</div>
