<div class="fixed inset-0 z-[100] bg-[#0a0a0a] text-white overflow-hidden flex flex-col font-sans">
  
  <!-- Atmospheric Background -->
  <div class="absolute inset-0 z-0 opacity-60 transition-opacity duration-1000" [class.opacity-100]="liveState() === 'speaking'">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] rounded-full blur-[100px] transition-all duration-300 ease-out"
         [style.transform]="'translate(-50%, -50%) scale(' + audioService.audioScale() + ')'"
         [class.bg-indigo-500]="liveState() === 'speaking'"
         [class.bg-blue-500]="liveState() === 'listening'"
         [class.bg-slate-700]="liveState() === 'idle' || liveState() === 'connecting'"
         [class.opacity-20]="liveState() === 'idle'"
         [class.opacity-40]="liveState() !== 'idle'">
    </div>
  </div>

  <!-- Header -->
  <div class="relative z-10 p-6 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md border border-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-white">
          <path fill-rule="evenodd" d="M9 4.5a.75.75 0 0 1 .721.544l.813 2.846a3.75 3.75 0 0 0 2.576 2.576l2.846.813a.75.75 0 0 1 0 1.442l-2.846.813a3.75 3.75 0 0 0-2.576 2.576l-.813 2.846a.75.75 0 0 1-1.442 0l-.813-2.846a3.75 3.75 0 0 0-2.576-2.576l-2.846-.813a.75.75 0 0 1 0-1.442l2.846-.813A3.75 3.75 0 0 0 7.466 7.89l.813-2.846A.75.75 0 0 1 9 4.5ZM18 1.5a.75.75 0 0 1 .728.568l.258 1.036c.236.94.97 1.674 1.91 1.91l1.036.258a.75.75 0 0 1 0 1.456l-1.036.258c-.94.236-1.674.97-1.91 1.91l-.258 1.036a.75.75 0 0 1-1.456 0l-.258-1.036a2.625 2.625 0 0 0-1.91-1.91l-1.036-.258a.75.75 0 0 1 0-1.456l1.036-.258a2.625 2.625 0 0 0 1.91-1.91l.258-1.036A.75.75 0 0 1 18 1.5ZM16.5 15a.75.75 0 0 1 .712.513l.394 1.183c.15.447.5.799.948.948l1.183.395a.75.75 0 0 1 0 1.422l-1.183.395c-.447.15-.799.5-.948.948l-.395 1.183a.75.75 0 0 1-1.422 0l-.395-1.183a1.5 1.5 0 0 0-.948-.948l-1.183-.395a.75.75 0 0 1 0-1.422l1.183-.395c.447-.15.799-.5.948-.948l.395-1.183A.75.75 0 0 1 16.5 15Z" clip-rule="evenodd" />
        </svg>
      </div>
      <span class="font-medium tracking-wide text-lg">Aman Live</span>
    </div>
    
    <button (click)="closeLiveView()" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center backdrop-blur-md transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Main Content Area (Transcript & Visualizer) -->
  <div class="flex-1 relative flex flex-col items-center justify-center p-6 z-10 overflow-hidden">
    
    <!-- Chat History Overlay (Subtle) -->
    <div class="absolute inset-x-0 top-0 bottom-32 overflow-y-auto p-6 flex flex-col gap-4 mask-fade-top z-20 pointer-events-none">
      <div class="flex-1"></div>
      @for (msg of messages(); track msg.id) {
        <div class="max-w-xl mx-auto w-full animate-fadeIn" [class.text-right]="msg.role === 'user'" [class.text-left]="msg.role === 'model'">
          <div class="inline-block px-4 py-2 rounded-2xl backdrop-blur-md border border-white/5 text-sm pointer-events-auto"
               [class.bg-white/5]="msg.role === 'user'"
               [class.bg-indigo-500/10]="msg.role === 'model'">
            <p class="text-white/60 leading-relaxed">{{ msg.text }}</p>
            @if (msg.generatedImages; as images) {
              <div class="mt-2 flex flex-wrap gap-2">
                @for (img of images; track img.url) {
                  <img [src]="img.url" class="w-20 h-20 rounded-lg object-cover border border-white/10">
                }
              </div>
            }
          </div>
        </div>
      }
    </div>

    <!-- Central Visualizer -->
    <app-live-visualizer [state]="liveState()"></app-live-visualizer>

    <!-- Transcript & Visual Content -->
    <div class="w-full max-w-2xl text-center space-y-4 min-h-[120px] flex flex-col justify-end">
      <app-live-visual-content [content]="visualContent()" (close)="visualContent.set(null)"></app-live-visual-content>
      <app-live-transcript 
        [state]="liveState()" 
        [finalTranscript]="liveFinalTranscript()" 
        [interimTranscript]="liveInterimTranscript()" 
        [error]="liveError()">
      </app-live-transcript>
    </div>
  </div>

  <!-- Controls -->
  <app-live-controls 
    [state]="liveState()" 
    [showVoiceSelector]="showVoiceSelector()"
    (interrupt)="interruptAISpeech()"
    (mainAction)="handleLiveViewMainButtonClick()"
    (selectVoice)="selectVoice($event)">
  </app-live-controls>
</div>
