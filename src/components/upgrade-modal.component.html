<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-fadeIn"
     [dir]="currentLang() === 'ar' ? 'rtl' : 'ltr'">
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col animate-scaleIn"
       [class.bg-white]="!themeService.isDark()"
       [class.bg-slate-800]="themeService.isDark()">
    
    <!-- Header -->
    <div class="p-6 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center shrink-0">
      <h2 class="text-2xl font-bold text-slate-800 dark:text-white">{{ t().upgradeTitle }}</h2>
      <button (click)="closeModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto p-6">
      @if (!paymentSubmitted()) {
        <div class="space-y-8">
          <!-- Billing Cycle Toggle -->
          <div class="flex justify-center">
            <div class="bg-gray-100 dark:bg-slate-700 p-1 rounded-xl flex gap-1">
              <button (click)="billingCycle.set('monthly')" 
                      class="px-6 py-2 rounded-lg text-sm font-medium transition-all"
                      [class.bg-white]="billingCycle() === 'monthly'"
                      [class.dark:bg-slate-600]="billingCycle() === 'monthly'"
                      [class.shadow-sm]="billingCycle() === 'monthly'"
                      [class.text-slate-900]="billingCycle() === 'monthly'"
                      [class.dark:text-white]="billingCycle() === 'monthly'"
                      [class.text-slate-500]="billingCycle() !== 'monthly'">
                {{ t().monthly }}
              </button>
              <button (click)="billingCycle.set('yearly')" 
                      class="px-6 py-2 rounded-lg text-sm font-medium transition-all"
                      [class.bg-white]="billingCycle() === 'yearly'"
                      [class.dark:bg-slate-600]="billingCycle() === 'yearly'"
                      [class.shadow-sm]="billingCycle() === 'yearly'"
                      [class.text-slate-900]="billingCycle() === 'yearly'"
                      [class.dark:text-white]="billingCycle() === 'yearly'"
                      [class.text-slate-500]="billingCycle() !== 'yearly'">
                {{ t().yearly }}
                <span class="ml-1 text-[10px] bg-green-500 text-white px-1.5 py-0.5 rounded-full">-20%</span>
              </button>
            </div>
          </div>

          <!-- Plans Grid -->
          <app-upgrade-plans 
            [billingCycle]="billingCycle()"
            [pricing]="pricing()"
            [selectedPlan]="selectedPlanForPayment()"
            (select)="selectPlan($event)">
          </app-upgrade-plans>

          <!-- Payment Section -->
          @if (selectedPlanForPayment()) {
            <div class="mt-8 pt-8 border-t border-gray-100 dark:border-slate-700 animate-fadeIn">
              <app-upgrade-payment
                [plan]="selectedPlanForPayment()!"
                [cycle]="billingCycle()"
                [price]="pricing()[selectedPlanForPayment()!][billingCycle()]"
                [paymentMethods]="paymentMethods()"
                [isSubmitting]="isSubmitting()"
                (submit)="onPaymentSubmit($event)">
              </app-upgrade-payment>
            </div>
          }
        </div>
      } @else {
        <!-- Success State -->
        <div class="flex flex-col items-center justify-center py-12 text-center space-y-6 animate-scaleIn">
          <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center text-green-600 dark:text-green-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-10 h-10">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
          </div>
          <div class="space-y-2">
            <h3 class="text-2xl font-bold text-slate-800 dark:text-white">{{ t().paymentSubmitted }}</h3>
            <p class="text-slate-500 dark:text-slate-400 max-w-md mx-auto">{{ t().paymentVerificationNote }}</p>
          </div>
          <button (click)="closeModal()" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all shadow-lg hover:shadow-blue-500/30">
            {{ t().close }}
          </button>
        </div>
      }
    </div>

  </div>
</div>
