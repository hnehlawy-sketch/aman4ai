<div class="fixed inset-0 z-[60] flex items-center justify-center p-4">
  <div (click)="close.emit()" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
  
  <div class="w-full max-w-lg rounded-3xl shadow-2xl p-8 relative z-10"
       [class.bg-white]="!themeService.isDark()"
       [class.bg-slate-900]="themeService.isDark()"
       [class.border]="themeService.isDark()"
       [class.border-slate-800]="themeService.isDark()">
    
    <button (click)="close.emit()" class="absolute top-4 right-4 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors">
      <mat-icon>close</mat-icon>
    </button>

    <div class="mb-6">
      <h2 class="text-2xl font-bold dark:text-white">{{ t().upgradePremium }}</h2>
      <p class="text-sm opacity-70 dark:text-slate-400">{{ t().premiumSoon }}</p>
    </div>

    @if (!selectedPlanForPayment()) {
      <app-upgrade-plans (selectPlan)="selectPlan($event)"></app-upgrade-plans>
    } @else {
      @if (paymentSubmitted()) {
        <div class="text-center py-8">
          <mat-icon class="text-green-500 text-6xl h-16 w-16 mb-4">check_circle</mat-icon>
          <h3 class="text-xl font-bold mb-2">{{ t().paymentPending }}</h3>
          <button (click)="close.emit()" class="mt-6 px-6 py-2 bg-indigo-600 text-white rounded-xl">
            {{ t().infoOk }}
          </button>
        </div>
      } @else {
        <app-upgrade-payment [plan]="selectedPlanForPayment()" (submit)="onPaymentSubmit($event)"></app-upgrade-payment>
        <button (click)="selectedPlanForPayment.set(null)" class="mt-4 text-sm text-indigo-600 hover:underline">
          {{ t().back }}
        </button>
      }
    }
  </div>
</div>
